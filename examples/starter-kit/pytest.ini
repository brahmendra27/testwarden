[pytest]
# Playwright artifacts on failure + retry-based flaky detection.
addopts = --browser chromium --screenshot only-on-failure --tracing retain-on-failure --reruns 2

# --- FlakeLens reporting (uncomment / set the key to stream results) ---
flakelens_url = http://localhost:8787
flakelens_framework = pytest-playwright
; Set the project's ingestion key via env before running:
;   $env:FLAKELENS_API_KEY = "flk_..."   (PowerShell)
;   export FLAKELENS_API_KEY=flk_...      (bash)

markers =
    smoke: fast critical-path checks
    regression: broader coverage
    quarantine: FlakeLens-managed — runs as non-strict xfail so CI stays green
