name: Publish pytest-flakelens to PyPI

# Fires when you push a tag like `reporter-v0.1.0`. Uses PyPI Trusted Publishing
# (OIDC) — no API token stored in the repo. Configure the trusted publisher once
# at https://pypi.org/manage/project/pytest-flakelens/settings/publishing/
# (workflow: publish-pypi.yml, environment: pypi).

on:
  push:
    tags:
      - "reporter-v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distribution
        working-directory: packages/pytest-flakelens
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/pytest-flakelens/dist/
