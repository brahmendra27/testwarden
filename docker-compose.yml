services:
  db:
    image: postgres:16
    container_name: flakelens-db
    environment:
      POSTGRES_USER: flakelens
      POSTGRES_PASSWORD: flakelens
      POSTGRES_DB: flakelens
    ports:
      - "5433:5432"
    volumes:
      - flakelens-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flakelens"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  flakelens-pgdata:
