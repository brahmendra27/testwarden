[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pytest-testwarden"
version = "0.1.0"
description = "Pytest reporter that streams test results, retries and artifacts to a TestWarden server"
requires-python = ">=3.10"
dependencies = [
    "pytest>=7.0",
    "httpx>=0.24",
]

[project.optional-dependencies]
dev = ["pytest-rerunfailures>=12.0"]

[project.entry-points.pytest11]
testwarden = "testwarden_reporter.plugin"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
